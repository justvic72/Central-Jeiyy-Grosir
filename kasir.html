<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central Grosir</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#dbe4ea;
    }

    /* HOME */
    .home{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:linear-gradient(135deg,#374151,#2563eb,#16a34a);
      color:white;
      padding:20px;
    }

    /* LOGO */
    .logo-toko{
      width:140px;
      height:140px;
      object-fit:cover;
      border-radius:25px;
      margin-bottom:20px;
      box-shadow:0 0 15px rgba(0,0,0,0.2);
      background:white;
      padding:8px;
    }

    .home h1{
      font-size:55px;
      margin-bottom:15px;
    }

    .home p{
      font-size:22px;
      margin-bottom:30px;
    }

    .home button{
      padding:15px 35px;
      border:none;
      border-radius:12px;
      font-size:20px;
      cursor:pointer;
      background:white;
      color:#2563eb;
      font-weight:bold;
    }

    /* SHOP */
    .shop{
      display:none;
      padding:20px;
      max-width:1400px;
      margin:auto;
      background:#dbe4ea;
      min-height:100vh;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      gap:10px;
      flex-wrap:wrap;
    }

    .judul{
      color:#374151;
      font-size:32px;
    }

    .top-buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .edit-btn{
      padding:10px 18px;
      border:none;
      border-radius:10px;
      background:#374151;
      color:white;
      cursor:pointer;
      font-size:14px;
      font-weight:bold;
    }

    /* TAMBAH PRODUK */
    .tambah-produk{
      background:white;
      padding:20px;
      border-radius:15px;
      margin-bottom:20px;
      display:none;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .tambah-produk h2{
      color:#374151;
      margin-bottom:15px;
    }

    .tambah-produk input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    .tambah-produk button{
      width:100%;
      padding:14px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      background:#16a34a;
      color:white;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
    }

    /* PRODUK */
    .produk-container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
      gap:15px;
    }

    .card{
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 0 8px rgba(0,0,0,0.08);
      transition:0.2s;
    }

    .card:hover{
      transform:translateY(-3px);
    }

    .card img{
      width:100%;
      height:120px;
      object-fit:cover;
    }

    .edit-gambar{
      width:100%;
      padding:5px;
      display:none;
      font-size:12px;
    }

    .hapus-btn{
      width:100%;
      padding:8px;
      border:none;
      background:#dc2626;
      color:white;
      cursor:pointer;
      display:none;
      font-size:13px;
      font-weight:bold;
    }

    .card-content{
      padding:10px;
      text-align:center;
    }

    /* NAMA BARANG */
    .edit-nama{
      width:100%;
      min-height:65px;
      padding:8px;
      border-radius:8px;
      border:1px solid #ccc;
      margin-bottom:8px;
      text-align:center;
      font-size:12px;
      resize:none;
      overflow:hidden;
      white-space:normal;
      word-wrap:break-word;
      line-height:1.4;
    }

    .edit-harga,
    .jumlah{
      width:100%;
      padding:8px;
      border-radius:8px;
      border:1px solid #ccc;
      margin-bottom:8px;
      text-align:center;
      font-size:13px;
    }

    .edit-harga{
      color:#16a34a;
      font-weight:bold;
    }

    .jumlah{
      background:#f1f5f9;
    }

    /* CHECKOUT */
    .checkout{
      background:white;
      margin-top:25px;
      padding:20px;
      border-radius:15px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      color:#374151;
    }

    .checkout h2{
      margin-bottom:15px;
    }

    .checkout button{
      width:100%;
      padding:14px;
      margin-top:12px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
    }

    .checkout input{
      width:100%;
      padding:14px;
      margin-top:12px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:16px;
    }

    .hasil{
      margin-top:20px;
      line-height:2;
      font-size:20px;
    }

    /* HISTORY */
    .history-card{
      background:white;
      border-radius:15px;
      padding:18px;
      margin-bottom:15px;
      box-shadow:0 0 8px rgba(0,0,0,0.08);
      color:#374151;
    }

    .history-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      cursor:pointer;
      gap:10px;
      flex-wrap:wrap;
    }

    .history-detail{
      display:none;
      margin-top:15px;
      line-height:2;
      border-top:1px solid #d1d5db;
      padding-top:10px;
    }

    .history-detail ul{
      padding-left:20px;
    }

    @media(max-width:600px){

      .produk-container{
        grid-template-columns:
        repeat(2,1fr);
      }

      .judul{
        font-size:24px;
      }

      .home h1{
        font-size:40px;
      }

      .logo-toko{
        width:110px;
        height:110px;
      }

    }

  </style>
</head>

<body>

  <!-- HOME -->
  <div class="home" id="homePage">

    <!-- GANTI logo.png DENGAN NAMA FILE LOGO KAMU -->
    <img
      src="photo.JPG"
      class="logo-toko"
    >

    <h1>Central Grosir</h1>

    <p>Harga bersahabat, belanja lebih hemat</p>

    <button onclick="mulaiBelanja()">
      Mulai Berbelanja
    </button>

  </div>

  <!-- SHOP -->
  <div class="shop" id="shopPage">

    <div class="topbar">

      <h1 class="judul">
        Daftar Barang Grosir
      </h1>

      <div class="top-buttons">

        <button
          class="edit-btn"
          onclick="simpanData()"
          style="background:#16a34a;"
        >
          Simpan
        </button>

        <button
          class="edit-btn"
          onclick="bukaHistory()"
          style="background:#2563eb;"
        >
          History
        </button>

        <button
          class="edit-btn"
          id="btnEdit"
          onclick="toggleEdit()"
        >
          Edit
        </button>

      </div>

    </div>

    <!-- TAMBAH PRODUK -->
    <div class="tambah-produk" id="panelTambah">

      <h2>Tambah Barang Baru</h2>

      <input
        type="text"
        id="namaBaru"
        placeholder="Nama Barang"
      >

      <input
        type="text"
        id="hargaBaru"
        placeholder="Harga Barang"
        oninput="formatHargaInput(this)"
      >

      <input
        type="file"
        id="gambarBaru"
        accept="image/*"
      >

      <button onclick="tambahProduk()">
        Tambah Produk
      </button>

    </div>

    <!-- LIST PRODUK -->
    <div
      class="produk-container"
      id="produkContainer"
    ></div>

    <!-- CHECKOUT -->
    <div class="checkout">

      <h2>Total Belanja</h2>

      <button onclick="hitungTotal()">
        Hitung Total Belanja
      </button>

      <input
        type="text"
        id="uangBayar"
        placeholder="Masukkan uang bayar"
        oninput="formatHargaInput(this)"
      >

      <button onclick="hitungKembalian()">
        Hitung Kembalian
      </button>

      <button
        onclick="resetBelanja()"
        style="background:#dc2626;"
      >
        Reset Belanja
      </button>

      <div class="hasil">

        <p>
          <strong>Total Belanja:</strong>
          <span id="totalBelanja">Rp0</span>
        </p>

        <p>
          <strong>Uang Kembalian:</strong>
          <span id="kembalian">Rp0</span>
        </p>

      </div>

    </div>

  </div>

  <!-- HISTORY -->
  <div
    class="shop"
    id="historyPage"
  >

    <div class="topbar">

      <h1 class="judul">
        History Belanja
      </h1>

      <button
        class="edit-btn"
        onclick="kembaliKeShop()"
      >
        Back
      </button>

    </div>

    <div id="historyContainer"></div>

  </div>

  <script>

    let modeEdit = false;
    let totalBelanja = 0;

    // LOAD HISTORY
    let historyBelanja = JSON.parse(
      localStorage.getItem("historyBelanja")
    ) || [];

    // HAPUS HISTORY > 3 HARI
    const sekarang = Date.now();

    historyBelanja =
      historyBelanja.filter((item)=>{

        return (
          sekarang - item.timestamp
        ) < (3 * 24 * 60 * 60 * 1000);

      });

    localStorage.setItem(
      "historyBelanja",
      JSON.stringify(historyBelanja)
    );

    // LOAD PRODUK
    let produk = JSON.parse(
      localStorage.getItem("dataProduk")
    ) || [

      {
        nama:"Rokok Sampoerna Mild 16",
        harga:355000,
        gambar:"https://images.unsplash.com/photo-1574781330855-d0db8cc6a79c?q=80&w=800&auto=format&fit=crop"
      },

      {
        nama:"Rokok Sampoerna Mild 12",
        harga:255000,
        gambar:"https://images.unsplash.com/photo-1516594798947-e65505dbb29d?q=80&w=800&auto=format&fit=crop"
      },

      {
        nama:"Rokok G.G. Surya 16",
        harga:355000,
        gambar:"https://images.unsplash.com/photo-1507914372368-b2b085b925a1?q=80&w=800&auto=format&fit=crop"
      },

      {
        nama:"Rokok G.G. Surya 12",
        harga:255000,
        gambar:"https://images.unsplash.com/photo-1523293915678-d126868e96b2?q=80&w=800&auto=format&fit=crop"
      }

    ];

    function rupiah(angka){

      return "Rp" +
        angka.toLocaleString("id-ID");
    }

    function formatHargaInput(input){

      let angka =
        input.value.replace(/[^0-9]/g,'');

      angka = parseInt(angka || 0);

      input.value =
        "Rp" + angka.toLocaleString("id-ID");
    }

    function mulaiBelanja(){

      document.getElementById(
        "homePage"
      ).style.display = "none";

      document.getElementById(
        "shopPage"
      ).style.display = "block";

      tampilkanProduk();
    }

    function toggleEdit(){

      modeEdit = !modeEdit;

      const tombol =
        document.getElementById(
          "btnEdit"
        );

      const panelTambah =
        document.getElementById(
          "panelTambah"
        );

      if(modeEdit){

        tombol.innerHTML = "Selesai";

        tombol.style.background =
          "#16a34a";

        panelTambah.style.display =
          "block";

      }else{

        tombol.innerHTML = "Edit";

        tombol.style.background =
          "#374151";

        panelTambah.style.display =
          "none";
      }

      tampilkanProduk();
    }

    function tampilkanProduk(){

      const container =
        document.getElementById(
          "produkContainer"
        );

      container.innerHTML = "";

      produk.forEach((item,index)=>{

        container.innerHTML += `

          <div class="card">

            <img src="${item.gambar}">

            <input
              type="file"
              accept="image/*"
              class="edit-gambar"
              style="
                display:${modeEdit ? 'block' : 'none'}
              "
              onchange="ubahGambar(event,${index})"
            >

            <button
              class="hapus-btn"
              style="
                display:${modeEdit ? 'block' : 'none'}
              "
              onclick="hapusProduk(${index})"
            >
              Hapus Barang
            </button>

            <div class="card-content">

              <textarea
                class="edit-nama"
                id="nama${index}"
                ${modeEdit ? "" : "readonly"}
                onchange="ubahNama(${index})"
              >${item.nama}</textarea>

              <input
                type="text"
                class="edit-harga"
                id="harga${index}"
                value="${rupiah(item.harga)}"
                ${modeEdit ? "" : "readonly"}
                oninput="formatHargaInput(this)"
                onchange="ubahHarga(${index})"
              >

              <input
                type="number"
                min="0"
                value="0"
                class="jumlah"
                id="jumlah${index}"
              >

            </div>

          </div>

        `;
      });
    }

    function hapusProduk(index){

      const konfirmasi =
        confirm(
          "Yakin ingin menghapus barang ini?"
        );

      if(konfirmasi){

        produk.splice(index,1);

        tampilkanProduk();

        simpanData();
      }
    }

    function ubahNama(index){

      produk[index].nama =
        document.getElementById(
          `nama${index}`
        ).value;
    }

    function ubahHarga(index){

      const hargaText =
        document.getElementById(
          `harga${index}`
        ).value;

      const hargaBaru =
        parseInt(
          hargaText.replace(/[^0-9]/g,'')
        );

      if(!isNaN(hargaBaru)){

        produk[index].harga =
          hargaBaru;

        tampilkanProduk();
      }
    }

    function ubahGambar(event,index){

      const file =
        event.target.files[0];

      if(file){

        const reader =
          new FileReader();

        reader.onload = function(e){

          produk[index].gambar =
            e.target.result;

          tampilkanProduk();
        };

        reader.readAsDataURL(file);
      }
    }

    function tambahProduk(){

      const nama =
        document.getElementById(
          "namaBaru"
        ).value;

      const hargaText =
        document.getElementById(
          "hargaBaru"
        ).value;

      const harga =
        parseInt(
          hargaText.replace(/[^0-9]/g,'')
        );

      const file =
        document.getElementById(
          "gambarBaru"
        ).files[0];

      if(nama === "" || isNaN(harga)){

        alert("Isi nama dan harga barang!");

        return;
      }

      if(file){

        const reader =
          new FileReader();

        reader.onload = function(e){

          produk.push({

            nama:nama,
            harga:harga,
            gambar:e.target.result

          });

          tampilkanProduk();

          simpanData();
        };

        reader.readAsDataURL(file);

      }else{

        produk.push({

          nama:nama,
          harga:harga,
          gambar:"https://via.placeholder.com/300x200"

        });

        tampilkanProduk();

        simpanData();
      }

      document.getElementById(
        "namaBaru"
      ).value = "";

      document.getElementById(
        "hargaBaru"
      ).value = "";

      document.getElementById(
        "gambarBaru"
      ).value = "";
    }

    function hitungTotal(){

      totalBelanja = 0;

      produk.forEach((item,index)=>{

        const jumlah =
          parseInt(
            document.getElementById(
              `jumlah${index}`
            ).value
          ) || 0;

        totalBelanja +=
          jumlah * item.harga;
      });

      document.getElementById(
        "totalBelanja"
      ).innerHTML =
        rupiah(totalBelanja);
    }

    function hitungKembalian(){

      const bayarText =
        document.getElementById(
          "uangBayar"
        ).value;

      const bayar =
        parseInt(
          bayarText.replace(/[^0-9]/g,'')
        );

      if(isNaN(bayar)){

        alert("Masukkan uang bayar!");

        return;
      }

      if(bayar < totalBelanja){

        alert("Uang bayar kurang!");

        return;
      }

      const kembali =
        bayar - totalBelanja;

      document.getElementById(
        "kembalian"
      ).innerHTML =
        rupiah(kembali);

      const daftarBarang = [];

      produk.forEach((item,index)=>{

        const jumlah =
          parseInt(
            document.getElementById(
              `jumlah${index}`
            ).value
          ) || 0;

        if(jumlah > 0){

          daftarBarang.push({

            nama:item.nama,
            jumlah:jumlah,
            subtotal:
              jumlah * item.harga

          });
        }
      });

      const tanggal =
        new Date().toLocaleString(
          "id-ID"
        );

      historyBelanja.unshift({

        tanggal:tanggal,
        barang:daftarBarang,
        total:totalBelanja,
        bayar:bayar,
        kembali:kembali,
        timestamp:Date.now()

      });

      localStorage.setItem(
        "historyBelanja",
        JSON.stringify(historyBelanja)
      );

      tampilkanHistory();
    }

    function resetBelanja(){

      produk.forEach((item,index)=>{

        document.getElementById(
          `jumlah${index}`
        ).value = 0;

      });

      totalBelanja = 0;

      document.getElementById(
        "totalBelanja"
      ).innerHTML = "Rp0";

      document.getElementById(
        "kembalian"
      ).innerHTML = "Rp0";

      document.getElementById(
        "uangBayar"
      ).value = "";
    }

    function simpanData(){

      localStorage.setItem(
        "dataProduk",
        JSON.stringify(produk)
      );

      alert(
        "Daftar barang berhasil disimpan!"
      );
    }

    function bukaHistory(){

      document.getElementById(
        "shopPage"
      ).style.display = "none";

      document.getElementById(
        "historyPage"
      ).style.display = "block";

      tampilkanHistory();
    }

    function kembaliKeShop(){

      document.getElementById(
        "historyPage"
      ).style.display = "none";

      document.getElementById(
        "shopPage"
      ).style.display = "block";
    }

    function tampilkanHistory(){

      const container =
        document.getElementById(
          "historyContainer"
        );

      container.innerHTML = "";

      if(historyBelanja.length === 0){

        container.innerHTML =
          "<p style='color:#374151;'>Belum ada history belanja.</p>";

        return;
      }

      historyBelanja.forEach((data,index)=>{

        let detailBarang = "";

        data.barang.forEach((barang)=>{

          detailBarang += `

            <li>

              ${barang.nama}

              (${barang.jumlah}x)

              -

              ${rupiah(barang.subtotal)}

            </li>

          `;
        });

        container.innerHTML += `

          <div class="history-card">

            <div
              class="history-header"
              onclick="toggleHistory(${index})"
            >

              <h3>
                Transaksi
                ${index + 1}
              </h3>

              <span>
                ${data.tanggal}
              </span>

            </div>

            <div
              class="history-detail"
              id="detail${index}"
            >

              <h4>
                Barang Dibeli:
              </h4>

              <ul>
                ${detailBarang}
              </ul>

              <p>
                <strong>Total:</strong>
                ${rupiah(data.total)}
              </p>

              <p>
                <strong>Bayar:</strong>
                ${rupiah(data.bayar)}
              </p>

              <p>
                <strong>Kembalian:</strong>
                ${rupiah(data.kembali)}
              </p>

            </div>

          </div>

        `;
      });
    }

    function toggleHistory(index){

      const detail =
        document.getElementById(
          `detail${index}`
        );

      if(detail.style.display === "block"){

        detail.style.display = "none";

      }else{

        detail.style.display = "block";
      }
    }

  </script>

</body>
</html>
